---
apiVersion: v1
kind: Secret
metadata:
  name: lc-client-cloudinit
  namespace: satellite-cloud-native
  labels:
    app: lc-client
    app.kubernetes.io/name: lc-client
    app.kubernetes.io/part-of: satellite-cloud-native
    app.kubernetes.io/component: managed-host
    app.openshift.io/runtime: redhat
    demo-section: lifecycle
    demo: satellite-cloud-native
type: Opaque
stringData:
  userData: |
    #cloud-config
    user: cloud-user
    password: __DEMO_PASSWORD__
    chpasswd:
      expire: false
    ssh_pwauth: true
    runcmd:
      - |
        set -euo pipefail
        exec > /var/log/client-setup.log 2>&1
        echo "=== Lifecycle Client Onboarding Starting ==="

        SAT_SVC="satellite.satellite-cloud-native.svc.cluster.local"
        IDM_SVC="idm.satellite-cloud-native.svc.cluster.local"
        IDM_FQDN="__IDM_FQDN__"
        SAT_FQDN="__SAT_FQDN__"
        IPA_DOMAIN="__IPA_DOMAIN__"
        IPA_REALM="__IPA_REALM__"

        VM_NAME=$(nmcli -t -f DHCP4.OPTION dev show eth0 2>/dev/null | grep ':host_name =' | sed 's/.*= //' | head -1)
        VM_NAME="${VM_NAME:-lc-client-$(cat /proc/sys/kernel/random/boot_id | cut -c1-8)}"
        CLIENT_FQDN="${VM_NAME}.${IPA_DOMAIN}"
        hostnamectl set-hostname "${CLIENT_FQDN}"
        VM_IP=$(ip -4 addr show eth0 | grep -oP '(?<=inet )[\d.]+')
        sed -i 's/^127\.0\.0\.1.*/127.0.0.1 localhost localhost.localdomain/' /etc/hosts
        echo "${VM_IP} ${CLIENT_FQDN} ${VM_NAME}" >> /etc/hosts
        echo "Hostname: ${CLIENT_FQDN} IP: ${VM_IP}"

        IDM_IP=$(getent hosts "${IDM_SVC}" | awk '{print $1}')
        SAT_IP=$(getent hosts "${SAT_SVC}" | awk '{print $1}')
        [ -n "$IDM_IP" ] && echo "${IDM_IP} ${IDM_FQDN} idm" >> /etc/hosts
        [ -n "$SAT_IP" ] && echo "${SAT_IP} ${SAT_FQDN} satellite" >> /etc/hosts

        # --- Phase 0: RHSM Registration ---
        echo "--- Registering to RHSM ---"
        mkdir -p /mnt/rhsm
        mount /dev/disk/by-id/virtio-rhsm-creds /mnt/rhsm || mount /dev/$(lsblk -n -o NAME,SERIAL | grep rhsm-creds | awk '{print $1}') /mnt/rhsm || true
        if [ -f /mnt/rhsm/org ] && [ -f /mnt/rhsm/activationkey ]; then
          RHSM_ORG=$(cat /mnt/rhsm/org)
          RHSM_KEY=$(cat /mnt/rhsm/activationkey)
          subscription-manager register --org="${RHSM_ORG}" --activationkey="${RHSM_KEY}"
        else
          echo "ERROR: RHSM credentials not found."
          exit 1
        fi
        subscription-manager repos --disable '*'
        subscription-manager repos \
          --enable=rhel-9-for-x86_64-baseos-rpms \
          --enable=rhel-9-for-x86_64-appstream-rpms \
          --enable=satellite-client-6-for-rhel-9-x86_64-rpms

        dnf install -y ipa-client foreman_ygg_worker
        echo "--- RHSM Registration Complete ---"

        # --- Phase 1: IdM Enrollment ---
        echo "--- Enrolling to IdM ---"
        for i in $(seq 1 30); do
          curl -sk "https://${IDM_FQDN}/" > /dev/null 2>&1 && break
          echo "Waiting for IdM... attempt ${i}/30"
          sleep 20
        done

        ipa-client-install \
          --server="${IDM_FQDN}" \
          --domain="${IPA_DOMAIN}" \
          --realm="${IPA_REALM}" \
          --principal=admin \
          --password='__DEMO_PASSWORD__' \
          --hostname="${CLIENT_FQDN}" \
          --no-ntp \
          --no-dns-sshfp \
          --unattended \
          --force-join \
          --force

        if ! grep -q 'noaddresses' /etc/krb5.conf; then
          sed -i '/\[libdefaults\]/a\  noaddresses = true' /etc/krb5.conf
        fi
        echo "--- IdM Enrollment Complete ---"

        # --- Phase 2: Satellite Registration (lifecycle-specific activation key) ---
        echo "--- Registering to Satellite ---"
        REG_URL="__LC_REG_URL__"
        for i in $(seq 1 60); do
          curl -sk "${REG_URL}" 2>/dev/null | grep -q 'curl' && break
          echo "Waiting for lifecycle registration script... attempt ${i}/60"
          sleep 30
        done
        REG_SCRIPT=$(curl -sk "${REG_URL}" 2>/dev/null)
        if echo "${REG_SCRIPT}" | grep -q 'curl'; then
          echo "Executing Satellite lifecycle registration..."
          eval "${REG_SCRIPT}" 2>&1 || echo "Satellite registration init script had errors (non-fatal)"
        else
          echo "Lifecycle registration script not available, skipping"
        fi

        getent group yggdrasil-worker > /dev/null 2>&1 || groupadd -r yggdrasil-worker
        usermod -a -G yggdrasil-worker root

        SAT_CERT_DIR="/etc/pki/consumer"
        if [ -f "${SAT_CERT_DIR}/cert.pem" ] && rpm -q yggdrasil > /dev/null 2>&1; then
          cat > /etc/yggdrasil/config.toml <<YGGEOF
        broker = ["mqtts://${SAT_FQDN}:1883"]
        server = ["mqtts://${SAT_FQDN}:1883"]
        cert-file = "${SAT_CERT_DIR}/cert.pem"
        key-file = "${SAT_CERT_DIR}/key.pem"
        ca-root = ["/etc/rhsm/ca/katello-server-ca.pem"]
        log-level = "error"
        path-prefix = "yggdrasil"
        YGGEOF
          systemctl enable --now yggdrasild com.redhat.Yggdrasil1.Worker1.foreman.service 2>/dev/null
        fi
        echo "--- Satellite Registration Complete ---"

        echo "=== Lifecycle Client Onboarding Finished ==="
