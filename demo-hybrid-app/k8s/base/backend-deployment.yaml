---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hybrid-app-demo
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: hybrid-app
    app.kubernetes.io/component: api
    app.openshift.io/runtime: python
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"kubevirt.io/v1","kind":"VirtualMachine","name":"postgresql-vm","namespace":"hybrid-app-demo"},{"apiVersion":"apps/v1","kind":"Deployment","name":"redis","namespace":"hybrid-app-demo"}]'

spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: hybrid-app
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: backend
          image: quay.io/jwerak/hybrid-app-backend:latest
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: "postgresql-vm"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: POSTGRES_DB
              value: "appdb"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
