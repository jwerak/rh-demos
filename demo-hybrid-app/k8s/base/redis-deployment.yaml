---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hybrid-app-demo
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: hybrid-app
    app.kubernetes.io/component: cache
    app.openshift.io/runtime: redis
  annotations:
    app.openshift.io/connects-to: '[]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: hybrid-app
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: registry.redhat.io/rhel9/redis-7:latest
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
