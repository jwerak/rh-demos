---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-secrets-CLUSTER_NAME
  namespace: clusters
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: cluster-secrets-creator
      restartPolicy: Never
      containers:
        - name: create-secrets
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              CLUSTER_NAME="CLUSTER_NAME"
              NAMESPACE="clusters"

              if oc get secret "pullsecret-cluster-${CLUSTER_NAME}" -n "${NAMESPACE}" 2>/dev/null; then
                echo "Secrets already exist for ${CLUSTER_NAME}, skipping"
                exit 0
              fi

              echo "Creating secrets for ${CLUSTER_NAME}..."

              oc extract secret/pull-secret -n openshift-config --to=/tmp --confirm >/dev/null
              oc create secret generic "pullsecret-cluster-${CLUSTER_NAME}" \
                -n "${NAMESPACE}" \
                --from-file=.dockerconfigjson=/tmp/.dockerconfigjson \
                --type=kubernetes.io/dockerconfigjson

              ssh-keygen -t rsa -b 4096 -N '' -f /tmp/ssh-key -C "${CLUSTER_NAME}" <<< y >/dev/null 2>&1
              oc create secret generic "sshkey-cluster-${CLUSTER_NAME}" \
                -n "${NAMESPACE}" \
                --from-file=id_rsa=/tmp/ssh-key \
                --from-file=id_rsa.pub=/tmp/ssh-key.pub

              ETCD_KEY=$(openssl rand -base64 32)
              oc create secret generic "${CLUSTER_NAME}-etcd-encryption-key" \
                -n "${NAMESPACE}" \
                --from-literal=key="${ETCD_KEY}"

              echo "Secrets created for ${CLUSTER_NAME}"
