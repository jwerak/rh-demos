---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend
  namespace: hybrid-app-demo
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: hybrid-app
    app.kubernetes.io/component: web
spec:
  to:
    kind: Service
    name: frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
