---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: rhdh
data:
  app-config.yaml: |
    app:
      title: VM Self-Service Portal
      baseUrl: https://backstage-rhdh.__BASE_DOMAIN__

    backend:
      baseUrl: https://backstage-rhdh.__BASE_DOMAIN__
      cors:
        origin: https://backstage-rhdh.__BASE_DOMAIN__
      reading:
        allow:
          - host: "gitlab.gitlab.svc"
          - host: "gitlab.__BASE_DOMAIN__"
      auth:
        externalAccess:
          - type: static
            options:
              token: ${BACKEND_SECRET}
              subject: external-access

    auth:
      environment: production
      session:
        secret: ${SESSION_SECRET}
      providers:
        oidc:
          production:
            metadataUrl: https://keycloak.__BASE_DOMAIN__/realms/virt-portal/.well-known/openid-configuration
            clientId: ${KEYCLOAK_CLIENT_ID}
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            prompt: auto
            additionalScopes:
              - groups
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
    signInPage: oidc

    permission:
      enabled: true
      rbac:
        admin:
          users:
            - name: user:default/platform-admin
        pluginsWithPermission:
          - catalog
          - scaffolder
          - permission
        policies-csv-file: /opt/app-root/src/rbac-policies.csv
        policyFileReload: true

    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group]
      providers:
        keycloakOrg:
          default:
            baseUrl: https://keycloak.__BASE_DOMAIN__
            loginRealm: virt-portal
            realm: virt-portal
            clientId: ${KEYCLOAK_CLIENT_ID}
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            schedule:
              frequency: { minutes: 5 }
              timeout: { minutes: 3 }
              initialDelay: { seconds: 30 }
      locations:
        - type: url
          target: https://gitlab.__BASE_DOMAIN__/demo/templates/-/blob/main/catalog-info.yaml
          rules:
            - allow: [Location, Template]

    integrations:
      gitlab:
        - host: gitlab.__BASE_DOMAIN__
          token: ${GITLAB_TOKEN}
          apiBaseUrl: https://gitlab.__BASE_DOMAIN__/api/v4
          baseUrl: https://gitlab.__BASE_DOMAIN__
