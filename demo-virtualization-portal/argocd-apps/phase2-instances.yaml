---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virt-portal-gitea
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: __GITHUB_REPO__
    targetRevision: __GIT_REVISION__
    path: demo-virtualization-portal/base/gitea
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virt-portal-rhdh
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: __GITHUB_REPO__
    targetRevision: __GIT_REVISION__
    path: demo-virtualization-portal/base/rhdh
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
