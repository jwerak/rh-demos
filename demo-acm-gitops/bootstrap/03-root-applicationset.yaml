apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: acm-gitops-DEMO_ID
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: https://github.com/jwerak/rh-demos.git
        revision: DEMO_BRANCH
        directories:
          - path: demo-acm-gitops/environments/*/clusters
          - path: demo-acm-gitops/environments/*/policies
  template:
    metadata:
      name: "DEMO_ID-{{path[2]}}-{{path[3]}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/jwerak/rh-demos.git
        targetRevision: DEMO_BRANCH
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
