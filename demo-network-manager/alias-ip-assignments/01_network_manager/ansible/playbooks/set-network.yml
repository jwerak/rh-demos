---
# Pre-flight validation play (runs before main configuration)
- name: Validate IP assignments across all teams
  hosts: "{{ target | default('network_test_nodes') }}"
  gather_facts: false

  tasks:
    - name: Run IP conflict validation
      ansible.builtin.include_role:
        name: ip_inventory_validator
      run_once: true

# Main network configuration play
- name: Configure network interfaces with IP aliases
  hosts: "{{ target | default('network_test_nodes') }}"
  become: true
  gather_facts: true

  vars:
    secondary_interface: "{{ network_interface | default('enp2s0') }}"

  pre_tasks:
    - name: Display target host and interface
      ansible.builtin.debug:
        msg: "Configuring {{ secondary_interface }} on {{ inventory_hostname }}"

  roles:
    - role: ip_configuration

  post_tasks:
    - name: Verify applied configuration
      ansible.builtin.command:
        cmd: "ip -br addr show {{ secondary_interface }}"
      register: ip_verification
      changed_when: false

    - name: Display current IP configuration
      ansible.builtin.debug:
        var: ip_verification.stdout_lines
