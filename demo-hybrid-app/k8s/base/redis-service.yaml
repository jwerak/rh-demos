---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: hybrid-app-demo
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: hybrid-app
    app.kubernetes.io/component: cache
spec:
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
