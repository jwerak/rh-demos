[defaults]
# inventory=hosts_and_groups
# Disable host key checking for lab environments
# Remove this in production!
host_key_checking = False

# Roles paths - search in 01_network_manager roles and system roles
roles_path = ./01_network_manager/ansible/roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles

# Display settings
stdout_callback = yaml
callbacks_enabled = profile_tasks, timer

[ssh_connection]
# SSH options for connecting from container to host
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
