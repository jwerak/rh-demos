---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hybrid-app-demo
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: hybrid-app
    app.kubernetes.io/component: web
    app.openshift.io/runtime: nginx
spec:
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
