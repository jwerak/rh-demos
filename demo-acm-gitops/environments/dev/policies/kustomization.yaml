apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/policies/web-terminal
  - ../../../base/policies/quay

patches:
  - target:
      kind: Policy
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-policies
  - target:
      kind: Placement
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-policies
      - op: replace
        path: /spec/clusterSets
        value:
          - dev
  - target:
      kind: PlacementBinding
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-policies
