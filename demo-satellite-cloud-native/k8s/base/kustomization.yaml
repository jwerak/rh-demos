---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: satellite-cloud-native

resources:
  - namespace.yaml
  # IdM (FreeIPA)
  - idm-cloudinit-secret.yaml
  - idm-vm.yaml
  - idm-service.yaml
  - idm-route.yaml
  # Satellite
  - satellite-data-pvc.yaml
  - satellite-cloudinit-secret.yaml
  - satellite-vm.yaml
  - satellite-service.yaml
  - satellite-route.yaml
  # RHEL Client (single)
  - client-cloudinit-secret.yaml
  - client-vm.yaml
  # RHEL Client Pool (elastic scaling)
  - client-pool.yaml
  # Security/Compliance Client (Section B)
  - sec-client-vm.yaml
  # CIS-hardened Client (Demo b7/b8)
  - compliant-client-vm.yaml
  # Lifecycle Client templates (Section C — deployed dynamically by demo_c1)
  # lc-client-cloudinit-secret.yaml and lc-client-vm.yaml are templates,
  # applied via sed substitution in demo-scenarios.sh, not directly.
  # Network segmentation
  - network-policy.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: satellite-cloud-native
      demo: satellite-cloud-native

commonAnnotations:
  description: "Cloud-native Satellite + IdM demo on OpenShift Virtualization"
