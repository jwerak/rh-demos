---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: sec-client
  namespace: satellite-cloud-native
  labels:
    app: sec-client
    app.kubernetes.io/name: sec-client
    app.kubernetes.io/part-of: satellite-cloud-native
    app.kubernetes.io/component: managed-host
    app.openshift.io/runtime: redhat
    role: client
    demo-section: compliance
    demo: satellite-cloud-native
  annotations:
    app.openshift.io/connects-to: '[
      {"apiVersion":"kubevirt.io/v1","kind":"VirtualMachine","name":"satellite"},
      {"apiVersion":"kubevirt.io/v1","kind":"VirtualMachine","name":"idm"}
    ]'
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: sec-client
        app: sec-client
        app.kubernetes.io/name: sec-client
        app.kubernetes.io/part-of: satellite-cloud-native
        app.kubernetes.io/component: managed-host
        role: client
        demo-section: compliance
        demo: satellite-cloud-native
    spec:
      domain:
        cpu:
          cores: 1
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
            - name: rhsm-creds
              disk:
                bus: virtio
              serial: rhsm-creds
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 2Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: sec-client-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: client-cloudinit
        - name: rhsm-creds
          secret:
            secretName: rhsm-credentials
  dataVolumeTemplates:
    - metadata:
        name: sec-client-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: rhel9
          namespace: openshift-virtualization-os-images
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi
