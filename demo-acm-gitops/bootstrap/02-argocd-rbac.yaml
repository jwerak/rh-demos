apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-acm-gitops
rules:
  - apiGroups:
      - policy.open-cluster-management.io
    resources:
      - policies
      - placementbindings
    verbs:
      - "*"
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - placements
      - managedclustersets
      - managedclustersetbindings
      - managedclustersets/bind
      - managedclustersets/join
    verbs:
      - "*"
  - apiGroups:
      - hypershift.openshift.io
    resources:
      - hostedclusters
      - nodepools
    verbs:
      - "*"
  - apiGroups:
      - apps.open-cluster-management.io
    resources:
      - "*"
    verbs:
      - "*"
  - apiGroups:
      - ""
    resources:
      - namespaces
      - secrets
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - "*"
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
      - clusterrolebindings
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-acm-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-acm-gitops
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
---
apiVersion: v1
kind: Namespace
metadata:
  name: clusters
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-secrets-creator
  namespace: clusters
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-secrets-creator-anyuid
  namespace: clusters
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: cluster-secrets-creator
    namespace: clusters
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-secrets-creator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-secrets-creator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-secrets-creator
subjects:
  - kind: ServiceAccount
    name: cluster-secrets-creator
    namespace: clusters
