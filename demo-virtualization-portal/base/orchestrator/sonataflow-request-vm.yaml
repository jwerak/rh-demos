apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: request-vm-approval
  namespace: rhdh
  annotations:
    sonataflow.org/description: "Dual-approval workflow — polls GitLab MR approvals, requires both app-owner and security-admin, then merges automatically"
    sonataflow.org/expressionLang: jq
    sonataflow.org/profile: gitops
    sonataflow.org/version: "1.0"
  labels:
    app: request-vm-approval
    sonataflow.org/workflow-app: request-vm-approval
spec:
  flow:
    start:
      stateName: Extract MR IID
    dataInputSchema:
      failOnValidationErrors: false
      schema: schemas/request-vm-approval__main-schema.json
    extensions:
      - extensionid: workflow-output-schema
        outputSchema: schemas/workflow-output-schema.json
    functions:
      - name: getMergeRequest
        operation: specs/gitlab-openapi.yaml#getMergeRequest
        type: rest
      - name: getMergeRequestApprovals
        operation: specs/gitlab-openapi.yaml#getMergeRequestApprovals
        type: rest
      - name: mergeMergeRequest
        operation: specs/gitlab-openapi.yaml#mergeMergeRequest
        type: rest
      - name: createNotification
        operation: specs/notifications-openapi.yaml#createNotification
        type: rest
      - name: print
        type: custom
        operation: sysout
      - name: extractMrIid
        type: expression
        operation: '{ mr_iid: (.merge_request_url | split("/") | .[-1] | tonumber) }'
      - name: checkDualApproval
        type: expression
        operation: '{ dual_approved: (if .approvalStatus.approved_by then ([.approvalStatus.approved_by[].user.username] | (index("app-owner") != null) and (index("security-admin") != null)) else false end) }'
      - name: successResult
        type: expression
        operation: '{ "result": { "message": "VM " + .vm_name + " approved — both app-owner and security-admin approved. MR merged, ArgoCD will sync the changes.", "outputs": [{"key": "Merge Request", "value": .merge_request_url, "format": "link"}] } }'
      - name: deniedResult
        type: expression
        operation: '{ "result": { "message": "Request denied for VM " + .vm_name + " in " + .environment + ". MR was closed without merging." } }'
    states:
      - name: Extract MR IID
        type: operation
        actions:
          - name: extract
            functionRef:
              refName: extractMrIid
        transition:
          nextState: Notify approvers
      - name: Notify approvers
        type: operation
        actions:
          - name: notify
            functionRef:
              refName: createNotification
              arguments:
                recipients:
                  type: entity
                  entityRef:
                    - group:default/app-owners
                    - group:default/security-admins
                payload:
                  title: '"VM approval needed: " + .vm_name'
                  description: '"Request from " + .owner + " for VM " + .vm_name + " in " + .environment + " (" + .os_image + ", " + (.cpu_cores|tostring) + " CPU, " + (.memory_gi|tostring) + "GiB RAM, zone: " + (.network_zone // "n/a") + "). Review the MR and click Approve in GitLab. Both app-owner and security-admin approval required."'
                  link: .merge_request_url
                  severity: normal
                  topic: VM Approval
        transition:
          nextState: Poll approval status
      - name: Poll approval status
        type: operation
        actions:
          - name: getMR
            actionDataFilter:
              toStateData: .mrStatus
            functionRef:
              refName: getMergeRequest
              arguments:
                id: .project_id
                merge_request_iid: .mr_iid
                PRIVATE-TOKEN: $SECRET.GITLAB_TOKEN
            sleep:
              before: PT10S
          - name: getApprovals
            actionDataFilter:
              toStateData: .approvalStatus
            functionRef:
              refName: getMergeRequestApprovals
              arguments:
                id: .project_id
                merge_request_iid: .mr_iid
                PRIVATE-TOKEN: $SECRET.GITLAB_TOKEN
          - name: evalApprovals
            functionRef:
              refName: checkDualApproval
        transition:
          nextState: Check approval status
      - name: Check approval status
        type: switch
        dataConditions:
          - name: Closed
            condition: '.mrStatus.state == "closed"'
            transition:
              nextState: Denied
          - name: Already merged
            condition: '.mrStatus.state == "merged"'
            transition:
              nextState: Success
          - name: Dual approved
            condition: '.dual_approved == true'
            transition:
              nextState: Merge MR
        defaultCondition:
          transition:
            nextState: Poll approval status
      - name: Merge MR
        type: operation
        actions:
          - name: log
            functionRef:
              refName: print
              arguments:
                message: '"Dual approval received, merging MR for VM: " + .vm_name'
          - name: merge
            functionRef:
              refName: mergeMergeRequest
              arguments:
                id: .project_id
                merge_request_iid: .mr_iid
                PRIVATE-TOKEN: $SECRET.GITLAB_TOKEN
        transition:
          nextState: Success
      - name: Success
        type: operation
        actions:
          - name: log
            functionRef:
              refName: print
              arguments:
                message: '"VM MR merged: " + .vm_name'
          - name: result
            functionRef:
              refName: successResult
        end:
          terminate: true
      - name: Denied
        type: operation
        actions:
          - name: log
            functionRef:
              refName: print
              arguments:
                message: '"VM MR closed (denied): " + .vm_name'
          - name: result
            functionRef:
              refName: deniedResult
        end:
          terminate: true
  podTemplate:
    container:
      image: image-registry.openshift-image-registry.svc:5000/rhdh/wf-request-vm:latest
      envFrom:
        - secretRef:
            name: workflow-credentials
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          memory: "512Mi"
          cpu: "500m"
  resources:
    configMaps:
      - configMap:
          name: request-vm-approval-schemas
        workflowPath: schemas
      - configMap:
          name: request-vm-approval-specs
        workflowPath: specs
  persistence:
    postgresql:
      secretRef:
        name: sonataflow-db-credentials
        userKey: POSTGRES_USER
        passwordKey: POSTGRES_PASSWORD
      serviceRef:
        name: backstage-psql-rhdh
        port: 5432
        databaseName: backstage_plugin_orchestrator
        databaseSchema: request-vm-approval
