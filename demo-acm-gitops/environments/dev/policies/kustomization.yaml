apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/policies/web-terminal
  - ../../../base/policies/quay
  - ../../../base/policies/branding

patches:
  - target:
      kind: Policy
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-policies
  - target:
      kind: Policy
      name: environment-branding
    patch: |-
      - op: replace
        path: /spec/policy-templates/0/objectDefinition/spec/object-templates/0/objectDefinition/spec/text
        value: "⚙ DEV ENVIRONMENT"
      - op: replace
        path: /spec/policy-templates/0/objectDefinition/spec/object-templates/0/objectDefinition/spec/backgroundColor
        value: "#1cb933"
  - target:
      kind: Placement
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-policies
      - op: replace
        path: /spec/clusterSets
        value:
          - dev
  - target:
      kind: PlacementBinding
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-policies
