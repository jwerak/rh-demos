---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-vm
  title: Create Virtual Machine
  description: Order a new RHEL virtual machine on OpenShift Virtualization
  tags:
    - vm
    - openshift-virtualization
    - recommended
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform-team
  type: vm

  parameters:
    - title: VM Configuration
      required:
        - vmName
        - cpuCores
        - memoryGi
        - osImage
        - environment
      properties:
        vmName:
          title: VM Name
          type: string
          description: Name of the virtual machine (lowercase, alphanumeric, hyphens)
          pattern: "^[a-z][a-z0-9-]{1,61}[a-z0-9]$"
          ui:autofocus: true
        cpuCores:
          title: CPU Cores
          type: integer
          description: Number of vCPU cores
          default: 2
          enum:
            - 1
            - 2
            - 4
            - 8
          enumNames:
            - "1 core"
            - "2 cores"
            - "4 cores"
            - "8 cores"
        memoryGi:
          title: Memory (GiB)
          type: integer
          description: Amount of RAM in GiB
          default: 4
          enum:
            - 2
            - 4
            - 8
            - 16
          enumNames:
            - "2 GiB"
            - "4 GiB"
            - "8 GiB"
            - "16 GiB"
        diskSizeGi:
          title: Data Disk Size (GiB)
          type: integer
          description: Data disk size in GiB (expandable via Resize VM)
          default: 30
          enum:
            - 20
            - 30
            - 50
            - 100
          enumNames:
            - "20 GiB"
            - "30 GiB"
            - "50 GiB"
            - "100 GiB"
        osImage:
          title: OS Image
          type: string
          description: Base operating system image
          default: rhel9
          enum:
            - rhel9
            - rhel8
            - fedora
          enumNames:
            - "RHEL 9"
            - "RHEL 8"
            - "Fedora"
        environment:
          title: Environment
          type: string
          description: Target deployment environment
          default: vm-dev
          enum:
            - vm-dev
            - vm-staging
            - vm-prod
          enumNames:
            - "Development"
            - "Staging"
            - "Production"

    - title: Owner Information
      required:
        - owner
        - costCenter
      properties:
        owner:
          title: Owner
          type: string
          description: Team or user responsible for this VM
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
              - User
        costCenter:
          title: Cost Center
          type: string
          description: Cost center for billing and chargeback
          default: CC-001
          enum:
            - CC-001
            - CC-002
            - CC-003
            - CC-SHARED
          enumNames:
            - "CC-001 (Engineering)"
            - "CC-002 (Operations)"
            - "CC-003 (QA)"
            - "CC-SHARED (Shared Services)"

  steps:
    - id: fetch-init
      name: Fetch Catalog Skeleton
      action: fetch:template
      input:
        url: ./skeleton-init
        values:
          vmName: ${{ parameters.vmName }}
          cpuCores: ${{ parameters.cpuCores }}
          memoryGi: ${{ parameters.memoryGi }}
          diskSizeGi: ${{ parameters.diskSizeGi }}
          osImage: ${{ parameters.osImage }}
          environment: ${{ parameters.environment }}
          owner: ${{ parameters.owner }}
          costCenter: ${{ parameters.costCenter }}

    - id: publish
      name: Create Repository
      action: publish:gitlab
      input:
        repoUrl: gitlab.gitlab.svc.cluster.local?owner=vm-instances&repo=${{ parameters.vmName }}
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: http://gitlab.gitlab.svc.cluster.local/vm-instances/${{ parameters.vmName }}/-/blob/main/catalog-info.yaml

    - id: fetch-vm
      name: Fetch VM Manifests
      action: fetch:template
      input:
        url: ./skeleton-vm
        values:
          vmName: ${{ parameters.vmName }}
          cpuCores: ${{ parameters.cpuCores }}
          memoryGi: ${{ parameters.memoryGi }}
          diskSizeGi: ${{ parameters.diskSizeGi }}
          osImage: ${{ parameters.osImage }}
          environment: ${{ parameters.environment }}
          owner: ${{ parameters.owner }}
          costCenter: ${{ parameters.costCenter }}

    - id: create-mr
      name: Create Merge Request for Approval
      action: publish:gitlab:merge-request
      input:
        repoUrl: gitlab.gitlab.svc.cluster.local?owner=vm-instances&repo=${{ parameters.vmName }}
        branchName: provision/${{ parameters.vmName }}
        title: "Provision VM: ${{ parameters.vmName }}"
        description: |
          ## VM Provisioning Request

          | Parameter | Value |
          |-----------|-------|
          | **VM Name** | ${{ parameters.vmName }} |
          | **CPU Cores** | ${{ parameters.cpuCores }} |
          | **Memory** | ${{ parameters.memoryGi }} GiB |
          | **Disk** | ${{ parameters.diskSizeGi }} GiB |
          | **OS Image** | ${{ parameters.osImage }} |
          | **Environment** | ${{ parameters.environment }} |
          | **Owner** | ${{ parameters.owner }} |
          | **Cost Center** | ${{ parameters.costCenter }} |

          Requested via RHDH Self-Service Portal.
          Merge this MR to provision the VM via ArgoCD GitOps.
        targetBranchName: main
        removeSourceBranch: true

    - id: run-approval-workflow
      name: Start Approval Workflow
      action: orchestrator:workflow:run
      input:
        workflow_id: request-vm-approval
        target_entity: ${{ steps['register'].output.entityRef }}
        parameters:
          vm_name: ${{ parameters.vmName }}
          environment: ${{ parameters.environment }}
          os_image: ${{ parameters.osImage }}
          cpu_cores: ${{ parameters.cpuCores }}
          memory_gi: ${{ parameters.memoryGi }}
          owner: ${{ parameters.owner }}
          project_id: ${{ steps['publish'].output.projectId }}
          merge_request_url: ${{ steps['create-mr'].output.mergeRequestUrl }}

  output:
    links:
      - title: Merge Request (Approval Required)
        url: ${{ steps['create-mr'].output.mergeRequestUrl }}
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Catalog Entry
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
