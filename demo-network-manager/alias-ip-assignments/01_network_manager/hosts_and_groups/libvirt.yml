---
plugin: community.libvirt.libvirt
uri: 'qemu+ssh://root@host.containers.internal/system?no_verify=1'
compose:
  # Extract the first non-loopback IP address (if.1.addr.0.addr)
  ansible_host: guest_info['if.1.addr.0.addr']
  ansible_connection: "'ssh'"
filters:
  # Only include running VMs
  - state == 'running'