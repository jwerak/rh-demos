---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hybrid-app-dev

resources:
  - ../../base

nameSuffix: -dev

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend
  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend
  - path: postgresql-vm-patch.yaml
    target:
      kind: VirtualMachine
      name: postgresql-vm

# Development-specific labels
commonLabels:
  environment: development
