---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: postgresql-vm
spec:
  template:
    metadata:
      labels:
        demo: hybrid-cloud
        environment: production
    spec:
      domain:
        cpu:
          cores: 2
        resources:
          requests:
            memory: 4Gi
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:40
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: postgresql-vm-cloudinit-prod
        - name: postgresql-data
          dataVolume:
            name: postgresql-vm-data-prod
