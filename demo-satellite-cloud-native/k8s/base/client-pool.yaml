---
apiVersion: pool.kubevirt.io/v1beta1
kind: VirtualMachinePool
metadata:
  name: client-pool
  namespace: satellite-cloud-native
  labels:
    app: client-pool
    app.kubernetes.io/name: client-pool
    app.kubernetes.io/part-of: satellite-cloud-native
    app.kubernetes.io/component: managed-host
    role: client
    demo: satellite-cloud-native
spec:
  replicas: 0
  selector:
    matchLabels:
      kubevirt.io/vmpool: client-pool
  virtualMachineTemplate:
    metadata:
      labels:
        kubevirt.io/vmpool: client-pool
        app: client-pool
        app.kubernetes.io/name: client-pool
        app.kubernetes.io/part-of: satellite-cloud-native
        app.kubernetes.io/component: managed-host
        role: client
        demo: satellite-cloud-native
    spec:
      runStrategy: Always
      template:
        metadata:
          labels:
            kubevirt.io/vmpool: client-pool
            app: client-pool
            app.kubernetes.io/name: client-pool
            app.kubernetes.io/part-of: satellite-cloud-native
            app.kubernetes.io/component: managed-host
            role: client
            demo: satellite-cloud-native
        spec:
          domain:
            cpu:
              cores: 1
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
                - name: rhsm-creds
                  disk:
                    bus: virtio
                  serial: rhsm-creds
              interfaces:
                - name: default
                  masquerade: {}
            resources:
              requests:
                memory: 2Gi
          networks:
            - name: default
              pod: {}
          volumes:
            - name: rootdisk
              dataVolume:
                name: pool-rootdisk
            - name: cloudinitdisk
              cloudInitNoCloud:
                secretRef:
                  name: client-cloudinit
            - name: rhsm-creds
              secret:
                secretName: rhsm-credentials
      dataVolumeTemplates:
        - metadata:
            name: pool-rootdisk
          spec:
            sourceRef:
              kind: DataSource
              name: rhel9
              namespace: openshift-virtualization-os-images
            storage:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 30Gi
