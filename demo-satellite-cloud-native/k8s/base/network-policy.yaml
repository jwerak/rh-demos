---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-client-to-client
  namespace: satellite-cloud-native
  labels:
    app.kubernetes.io/part-of: satellite-cloud-native
    demo: satellite-cloud-native
spec:
  podSelector:
    matchLabels:
      role: client
  policyTypes:
    - Egress
  egress:
    # Allow to non-client pods in this namespace (infra VMs, virt-launcher, etc.)
    - to:
        - podSelector:
            matchExpressions:
              - key: role
                operator: NotIn
                values:
                  - client
    # Allow to all other namespaces (DNS, API server, etc.)
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - satellite-cloud-native
    # Allow to external IPs (RHSM, package repos)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.132.0.0/14
