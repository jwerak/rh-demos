---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hybrid-app-demo
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: hybrid-app
    app.kubernetes.io/component: api
    app.openshift.io/runtime: python
spec:
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
