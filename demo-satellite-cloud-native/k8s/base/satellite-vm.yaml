---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: satellite
  namespace: satellite-cloud-native
  labels:
    app: satellite
    app.kubernetes.io/name: satellite
    app.kubernetes.io/part-of: satellite-cloud-native
    app.kubernetes.io/component: content-management
    app.openshift.io/runtime: redhat
    role: infra
    demo: satellite-cloud-native
  annotations:
    app.openshift.io/connects-to: '[]'
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: satellite
        app: satellite
        app.kubernetes.io/name: satellite
        app.kubernetes.io/part-of: satellite-cloud-native
        app.kubernetes.io/component: content-management
        role: infra
        demo: satellite-cloud-native
    spec:
      domain:
        cpu:
          cores: 4
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
            - name: pulp-data
              disk:
                bus: virtio
            - name: rhsm-creds
              disk:
                bus: virtio
              serial: rhsm-creds
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 22Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: satellite-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: satellite-cloudinit
        - name: pulp-data
          persistentVolumeClaim:
            claimName: satellite-pulp-data
        - name: rhsm-creds
          secret:
            secretName: rhsm-credentials
  dataVolumeTemplates:
    - metadata:
        name: satellite-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: rhel9
          namespace: openshift-virtualization-os-images
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 100Gi
