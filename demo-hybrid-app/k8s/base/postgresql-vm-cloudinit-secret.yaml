---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-vm-cloudinit
  namespace: hybrid-app-demo
  labels:
    app: postgresql-vm
    app.kubernetes.io/name: postgresql-vm
    app.kubernetes.io/part-of: hybrid-app
    app.kubernetes.io/component: database
    demo: hybrid-cloud
type: Opaque
stringData:
  userData: |
    #cloud-config
    user: fedora
    password: fedora
    chpasswd:
      expire: false
    ssh_pwauth: true
    packages:
      - postgresql
      - postgresql-server
      - util-linux
    runcmd:
      # Set up data disk for PostgreSQL
      - |
        # Wait for disk to be available
        sleep 5
        # Find the data disk (usually vdc after containerdisk and cloudinitdisk)
        DATA_DISK=$(lsblk -n -o NAME,TYPE | grep -E '^vd[b-z] disk$' | head -1 | awk '{print $1}')
        if [ -n "$DATA_DISK" ]; then
          # Check if disk is already formatted
          if ! blkid /dev/$DATA_DISK > /dev/null 2>&1; then
            # Format disk with ext4
            sudo mkfs.ext4 -F /dev/$DATA_DISK
          fi
          # Create mount point
          sudo mkdir -p /var/lib/pgsql/data
          # Mount the disk
          sudo mount /dev/$DATA_DISK /var/lib/pgsql/data
          # Add to fstab for persistent mounting
          echo "/dev/$DATA_DISK /var/lib/pgsql/data ext4 defaults 0 2" | sudo tee -a /etc/fstab
          # Set correct ownership
          sudo chown postgres:postgres /var/lib/pgsql/data
          # Check if data directory is empty (first boot)
          if [ -z "$(ls -A /var/lib/pgsql/data)" ]; then
            # Initialize PostgreSQL on the data disk
            sudo -u postgres postgresql-setup --initdb
          else
            # Data already exists, just ensure PostgreSQL is configured
            echo "PostgreSQL data directory already contains data, skipping initialization"
          fi
        else
          echo "Warning: Data disk not found, using default location"
          sudo -u postgres postgresql-setup --initdb
        fi
      - sudo systemctl enable postgresql
      - sudo systemctl start postgresql
      # Wait for PostgreSQL to start
      - sleep 10
      # Create database user and database (idempotent)
      - |
        sudo -u postgres psql -c "SELECT 1 FROM pg_roles WHERE rolname='appuser'" | grep -q 1 || sudo -u postgres psql -c "CREATE USER appuser WITH PASSWORD 'apppassword';"
        sudo -u postgres psql -c "SELECT 1 FROM pg_database WHERE datname='appdb'" | grep -q 1 || sudo -u postgres psql -c "CREATE DATABASE appdb OWNER appuser;"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE appdb TO appuser;"
      # Create sample table and data (idempotent)
      - |
        sudo -u postgres psql -d appdb -c "SELECT 1 FROM information_schema.tables WHERE table_name='app_data'" | grep -q 1 || sudo -u postgres psql -d appdb -c "CREATE TABLE app_data (id SERIAL PRIMARY KEY, name VARCHAR(100), description TEXT, created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP);"
        sudo -u postgres psql -d appdb -c "ALTER TABLE app_data OWNER TO appuser;"
        sudo -u postgres psql -d appdb -c "SELECT COUNT(*) FROM app_data" | grep -q "0" && sudo -u postgres psql -d appdb -c "INSERT INTO app_data (name, description) VALUES ('Sample Item 1', 'This data is stored in PostgreSQL running on a KubeVirt VM'), ('Sample Item 2', 'Demonstrating hybrid cloud architecture'), ('Sample Item 3', 'Containers can access this legacy database'), ('Sample Item 4', 'Perfect for migration scenarios'), ('Sample Item 5', 'OpenShift + KubeVirt integration');"
      # Configure PostgreSQL to accept connections from pods
      - echo "host all all 0.0.0.0/0 md5" | sudo tee -a /var/lib/pgsql/data/pg_hba.conf
      - echo "listen_addresses = '*'" | sudo tee -a /var/lib/pgsql/data/postgresql.conf
      # Restart PostgreSQL to apply changes
      - sudo systemctl restart postgresql
      # Set up firewall rules
      - sudo firewall-cmd --permanent --add-service=postgresql
      - sudo firewall-cmd --reload

