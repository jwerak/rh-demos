---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: idm
  namespace: satellite-cloud-native
  labels:
    app: idm
    app.kubernetes.io/name: idm
    app.kubernetes.io/part-of: satellite-cloud-native
    app.kubernetes.io/component: identity
    app.openshift.io/runtime: redhat
    role: infra
    demo: satellite-cloud-native
  annotations:
    app.openshift.io/connects-to: '[]'
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: idm
        app: idm
        app.kubernetes.io/name: idm
        app.kubernetes.io/part-of: satellite-cloud-native
        app.kubernetes.io/component: identity
        role: infra
        demo: satellite-cloud-native
    spec:
      domain:
        cpu:
          cores: 2
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
            - name: rhsm-creds
              disk:
                bus: virtio
              serial: rhsm-creds
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 4Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: idm-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: idm-cloudinit
        - name: rhsm-creds
          secret:
            secretName: rhsm-credentials
  dataVolumeTemplates:
    - metadata:
        name: idm-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: rhel9
          namespace: openshift-virtualization-os-images
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi
