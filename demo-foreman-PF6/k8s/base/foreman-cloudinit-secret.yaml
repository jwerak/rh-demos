---
apiVersion: v1
kind: Secret
metadata:
  name: foreman-cloudinit
  namespace: foreman-demo
  labels:
    app: foreman
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: foreman-demo
    role: infra
    demo: foreman-demo
type: Opaque
stringData:
  userData: |
    #cloud-config
    hostname: foreman
    fqdn: __FOREMAN_FQDN__
    user: cloud-user
    password: __DEMO_PASSWORD__
    chpasswd:
      expire: false
    ssh_pwauth: true

    write_files:
      - path: /opt/foreman/docker-compose.yml
        permissions: '0644'
        content: |
          version: '3.4'
          services:
            db:
              image: docker.io/library/postgres:12
              environment:
                POSTGRES_USER: foreman
                POSTGRES_PASSWORD: foreman
                POSTGRES_DATABASE: foreman
                PGDATA: /var/lib/postgresql/data/pgdata
              restart: always
              volumes:
                - db:/var/lib/postgresql/data

            app:
              image: __FOREMAN_IMAGE__
              command: bundle exec bin/rails server -b 0.0.0.0
              environment:
                DATABASE_URL: postgres://foreman:foreman@db/foreman?pool=5
                RAILS_MAX_THREADS: "5"
                RAILS_ENV: production
                FOREMAN_FQDN: __FOREMAN_FQDN__
                FOREMAN_DOMAIN: __FOREMAN_DOMAIN__
                FOREMAN_RAILS_CACHE_STORE_TYPE: redis
                FOREMAN_RAILS_CACHE_STORE_URLS: redis://redis-cache:6379/0
                DYNFLOW_REDIS_URL: redis://redis-tasks:6379/0
                REDIS_PROVIDER: DYNFLOW_REDIS_URL
                SEED_ADMIN_PASSWORD: __DEMO_PASSWORD__
              ports:
                - "3000:3000"
              restart: always
              depends_on:
                - db
                - redis-cache
                - redis-tasks

            orchestrator:
              image: __FOREMAN_IMAGE__
              command: bundle exec sidekiq -r ./extras/dynflow-sidekiq.rb -c 1 -q dynflow_orchestrator
              environment:
                DATABASE_URL: postgres://foreman:foreman@db/foreman?pool=5
                RAILS_MAX_THREADS: "5"
                RAILS_ENV: production
                FOREMAN_FQDN: __FOREMAN_FQDN__
                FOREMAN_DOMAIN: __FOREMAN_DOMAIN__
                FOREMAN_RAILS_CACHE_STORE_TYPE: redis
                FOREMAN_RAILS_CACHE_STORE_URLS: redis://redis-cache:6379/0
                DYNFLOW_REDIS_URL: redis://redis-tasks:6379/0
                REDIS_PROVIDER: DYNFLOW_REDIS_URL
                SEED_ADMIN_PASSWORD: __DEMO_PASSWORD__
              restart: always
              depends_on:
                - db
                - redis-cache
                - redis-tasks

            worker:
              image: __FOREMAN_IMAGE__
              command: bundle exec sidekiq -r ./extras/dynflow-sidekiq.rb -c 15 -q default,1 -q remote_execution,1
              environment:
                DATABASE_URL: postgres://foreman:foreman@db/foreman?pool=5
                RAILS_MAX_THREADS: "5"
                RAILS_ENV: production
                FOREMAN_FQDN: __FOREMAN_FQDN__
                FOREMAN_DOMAIN: __FOREMAN_DOMAIN__
                FOREMAN_RAILS_CACHE_STORE_TYPE: redis
                FOREMAN_RAILS_CACHE_STORE_URLS: redis://redis-cache:6379/0
                DYNFLOW_REDIS_URL: redis://redis-tasks:6379/0
                REDIS_PROVIDER: DYNFLOW_REDIS_URL
                SEED_ADMIN_PASSWORD: __DEMO_PASSWORD__
              restart: always
              depends_on:
                - db
                - redis-cache
                - redis-tasks

            redis-cache:
              image: docker.io/library/redis:latest
              restart: always

            redis-tasks:
              image: docker.io/library/redis:latest
              command: redis-server --appendonly yes
              restart: always
              volumes:
                - redis-persistent:/data

          volumes:
            db:
            redis-persistent:

    runcmd:
      - |
        set -euo pipefail
        exec > /var/log/foreman-setup.log 2>&1
        echo "=== Phase 0: System Setup ==="

        FOREMAN_FQDN="__FOREMAN_FQDN__"

        hostnamectl set-hostname "${FOREMAN_FQDN}"

        # Map FQDN to real eth0 IP (not loopback — required for services to bind correctly)
        VM_IP=$(ip -4 addr show eth0 | grep -oP '(?<=inet )\d+\.\d+\.\d+\.\d+')
        sed -i 's/^127\.0\.0\.1.*/127.0.0.1 localhost localhost.localdomain/' /etc/hosts
        echo "${VM_IP} ${FOREMAN_FQDN} foreman" >> /etc/hosts

        echo "=== Phase 1: RHSM Registration ==="
        mkdir -p /mnt/rhsm
        mount /dev/disk/by-id/virtio-rhsm-creds /mnt/rhsm 2>/dev/null \
          || mount "/dev/$(lsblk -n -o NAME,SERIAL | grep rhsm-creds | awk '{print $1}')" /mnt/rhsm \
          || { echo "ERROR: Cannot mount RHSM credentials disk"; exit 1; }

        if [ -f /mnt/rhsm/org ] && [ -f /mnt/rhsm/activationkey ]; then
          RHSM_ORG=$(cat /mnt/rhsm/org)
          RHSM_KEY=$(cat /mnt/rhsm/activationkey)
          subscription-manager register --org="${RHSM_ORG}" --activationkey="${RHSM_KEY}" || true
        else
          echo "ERROR: RHSM credentials not found on disk"
          exit 1
        fi

        subscription-manager repos --disable '*'
        subscription-manager repos \
          --enable=rhel-9-for-x86_64-baseos-rpms \
          --enable=rhel-9-for-x86_64-appstream-rpms

        echo "=== Phase 2: Install Podman + Compose ==="
        dnf install -y podman python3-pip
        pip3 install podman-compose

        systemctl enable --now podman.socket

        # Ensure podman-compose is on PATH for all subsequent commands
        export PATH="/usr/local/bin:${PATH}"

        echo "=== Phase 3: Pull Images and Start Infrastructure ==="
        cd /opt/foreman
        podman-compose pull

        # Start only database and redis first (app needs migrations before it can boot)
        podman-compose up -d db redis-cache redis-tasks

        # Wait for database to accept connections
        for i in $(seq 1 30); do
          DB_CONTAINER=$(podman ps --filter "name=db" --format '{{.Names}}' | head -1)
          if [ -n "${DB_CONTAINER}" ] && podman exec "${DB_CONTAINER}" pg_isready -U foreman 2>/dev/null; then
            echo "Database is ready"
            break
          fi
          echo "Waiting for database... attempt ${i}/30"
          sleep 5
        done

        echo "=== Phase 4: Run Database Migrations ==="
        # Create the database first
        podman exec "${DB_CONTAINER}" psql -U foreman -c "SELECT 1" -d foreman 2>/dev/null \
          || podman exec "${DB_CONTAINER}" createdb -U foreman foreman

        # Run migrations and seed via one-shot containers on the same podman network
        PODMAN_NETWORK=$(podman network ls --format '{{.Name}}' | grep foreman | head -1)
        echo "Running migrations on network ${PODMAN_NETWORK}..."

        FOREMAN_ENV="-e DATABASE_URL=postgres://foreman:foreman@db/foreman?pool=5 \
          -e RAILS_ENV=production \
          -e FOREMAN_FQDN=__FOREMAN_FQDN__ \
          -e FOREMAN_DOMAIN=__FOREMAN_DOMAIN__ \
          -e FOREMAN_RAILS_CACHE_STORE_TYPE=redis \
          -e FOREMAN_RAILS_CACHE_STORE_URLS=redis://redis-cache:6379/0 \
          -e DYNFLOW_REDIS_URL=redis://redis-tasks:6379/0 \
          -e SEED_ADMIN_PASSWORD=__DEMO_PASSWORD__"

        eval podman run --rm --network "${PODMAN_NETWORK}" ${FOREMAN_ENV} \
          __FOREMAN_IMAGE__ bundle exec rake db:migrate
        echo "Migrations complete."

        # db:seed may fail on first attempt (bcrypt_cost setting not yet initialized),
        # retry once — second run succeeds after settings table is populated by migrate
        echo "Seeding database..."
        eval podman run --rm --network "${PODMAN_NETWORK}" ${FOREMAN_ENV} \
          __FOREMAN_IMAGE__ bundle exec rake db:seed \
          || eval podman run --rm --network "${PODMAN_NETWORK}" ${FOREMAN_ENV} \
            __FOREMAN_IMAGE__ bundle exec rake db:seed
        echo "Seed complete."

        echo "=== Phase 4b: Start Application Services ==="
        /usr/local/bin/podman-compose up -d
        echo "All services started."

        # Wait for Rails to respond
        for i in $(seq 1 60); do
          if curl -sf -u admin:__DEMO_PASSWORD__ http://127.0.0.1:3000/api/v2/status 2>/dev/null; then
            echo "Foreman API is responding"
            break
          fi
          echo "Waiting for Foreman API... attempt ${i}/60"
          sleep 10
        done

        echo "=== Phase 5: Create Systemd Service ==="
        printf '%s\n' \
          '[Unit]' \
          'Description=Foreman podman-compose' \
          'After=network-online.target podman.socket' \
          'Wants=network-online.target' \
          '' \
          '[Service]' \
          'Type=oneshot' \
          'RemainAfterExit=yes' \
          'WorkingDirectory=/opt/foreman' \
          'ExecStart=/usr/local/bin/podman-compose up -d' \
          'ExecStop=/usr/local/bin/podman-compose down' \
          'TimeoutStartSec=300' \
          '' \
          '[Install]' \
          'WantedBy=multi-user.target' \
          > /etc/systemd/system/foreman-compose.service
        systemctl daemon-reload
        systemctl enable foreman-compose.service

        echo "=== Phase 6: Registration File Server + Settings ==="
        mkdir -p /opt/foreman/registration

        curl -sf -u admin:__DEMO_PASSWORD__ -H "Content-Type: application/json" \
          -X PUT "http://127.0.0.1:3000/api/v2/settings/ssl_ca_file" \
          -d '{"value": "/etc/pki/tls/certs/ca-bundle.crt"}' >/dev/null 2>&1 || true
        curl -sf -u admin:__DEMO_PASSWORD__ -H "Content-Type: application/json" \
          -X PUT "http://127.0.0.1:3000/api/v2/settings/server_ca_file" \
          -d '{"value": "/etc/pki/tls/certs/ca-bundle.crt"}' >/dev/null 2>&1 || true
        echo "SSL CA settings configured."

        printf '%s\n' \
          '[Unit]' \
          'Description=Foreman registration file server' \
          'After=network-online.target' \
          '' \
          '[Service]' \
          'Type=simple' \
          'WorkingDirectory=/opt/foreman/registration' \
          'ExecStart=/usr/bin/python3 -m http.server 8080' \
          'Restart=always' \
          '' \
          '[Install]' \
          'WantedBy=multi-user.target' \
          > /etc/systemd/system/foreman-registration.service
        systemctl daemon-reload
        systemctl enable --now foreman-registration.service
        echo "Registration file server running on port 8080."

        echo "=== Phase 7: Seed Demo Configuration ==="

        FOREMAN_URL="http://127.0.0.1:3000/api/v2"
        FOREMAN_AUTH="admin:__DEMO_PASSWORD__"

        create_or_get() {
          local resource="$1" name="$2" data="$3" field="${4:-name}"
          local id=""
          id=$(curl -s -u "${FOREMAN_AUTH}" -H "Content-Type: application/json" \
            -X POST "${FOREMAN_URL}/${resource}" -d "${data}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null) || true
          if [ -z "${id}" ]; then
            id=$(curl -s -G -u "${FOREMAN_AUTH}" "${FOREMAN_URL}/${resource}" \
              --data-urlencode "search=${field}=\"${name}\"" \
              | python3 -c "import sys,json; r=json.load(sys.stdin).get('results',[]); print(r[0]['id'] if r else '')" 2>/dev/null) || true
          fi
          echo "${id}"
        }

        foreman_put() {
          curl -s -u "${FOREMAN_AUTH}" -H "Content-Type: application/json" \
            -X PUT "${FOREMAN_URL}/$1" -d "$2" >/dev/null 2>&1 || true
        }

        foreman_search_id() {
          curl -s -G -u "${FOREMAN_AUTH}" "${FOREMAN_URL}/$1" \
            --data-urlencode "search=$2" \
            | python3 -c "import sys,json; r=json.load(sys.stdin).get('results',[]); print(r[0]['id'] if r else '')" 2>/dev/null || true
        }

        echo "  Creating organizations..."
        ACME_ORG_ID=$(create_or_get organizations "ACME Corp" \
          '{"organization": {"name": "ACME Corp", "description": "Primary customer - production workloads"}}')
        GLOBEX_ORG_ID=$(create_or_get organizations "Globex Industries" \
          '{"organization": {"name": "Globex Industries", "description": "Secondary customer - development/staging"}}')
        echo "  Orgs: ACME=${ACME_ORG_ID} Globex=${GLOBEX_ORG_ID}"

        echo "  Creating locations..."
        US_EAST_LOC_ID=$(create_or_get locations "US-East / Virginia" \
          '{"location": {"name": "US-East / Virginia", "description": "Primary datacenter"}}')
        US_WEST_LOC_ID=$(create_or_get locations "US-West / Oregon" \
          '{"location": {"name": "US-West / Oregon", "description": "DR site"}}')
        EU_CENTRAL_LOC_ID=$(create_or_get locations "EU-Central / Frankfurt" \
          '{"location": {"name": "EU-Central / Frankfurt", "description": "GDPR-compliant region"}}')
        echo "  Locs: US-East=${US_EAST_LOC_ID} US-West=${US_WEST_LOC_ID} EU-Central=${EU_CENTRAL_LOC_ID}"

        echo "  Associating locations with organizations..."
        foreman_put "organizations/${ACME_ORG_ID}" \
          "{\"organization\": {\"location_ids\": [${US_EAST_LOC_ID}, ${US_WEST_LOC_ID}]}}"
        foreman_put "organizations/${GLOBEX_ORG_ID}" \
          "{\"organization\": {\"location_ids\": [${EU_CENTRAL_LOC_ID}]}}"

        echo "  Creating domains..."
        ACME_DOMAIN_ID=$(create_or_get domains acme.example.com \
          "{\"domain\": {\"name\": \"acme.example.com\", \"organization_ids\": [${ACME_ORG_ID}], \"location_ids\": [${US_EAST_LOC_ID}, ${US_WEST_LOC_ID}]}}")
        GLOBEX_DOMAIN_ID=$(create_or_get domains globex.example.com \
          "{\"domain\": {\"name\": \"globex.example.com\", \"organization_ids\": [${GLOBEX_ORG_ID}], \"location_ids\": [${EU_CENTRAL_LOC_ID}]}}")
        echo "  Domains: acme=${ACME_DOMAIN_ID} globex=${GLOBEX_DOMAIN_ID}"

        echo "  Creating operating systems..."
        RHEL_OS_ID=$(create_or_get operatingsystems "RHEL 9.4" \
          '{"operatingsystem": {"name": "RHEL", "major": "9", "minor": "4", "family": "Redhat"}}' title)
        CENTOS_OS_ID=$(create_or_get operatingsystems "CentOS_Stream 9.0" \
          '{"operatingsystem": {"name": "CentOS_Stream", "major": "9", "minor": "0", "family": "Redhat"}}' title)
        echo "  OSes: RHEL=${RHEL_OS_ID} CentOS=${CENTOS_OS_ID}"

        ARCH_ID=$(foreman_search_id architectures 'name="x86_64"')
        PTABLE_ID=$(foreman_search_id ptables 'name="Kickstart default"')
        if [ -n "${ARCH_ID}" ] && [ -n "${PTABLE_ID}" ]; then
          OS_ASSOC="{\"operatingsystem\": {\"architecture_ids\": [${ARCH_ID}], \"ptable_ids\": [${PTABLE_ID}]}}"
        elif [ -n "${ARCH_ID}" ]; then
          OS_ASSOC="{\"operatingsystem\": {\"architecture_ids\": [${ARCH_ID}]}}"
        else
          OS_ASSOC=""
        fi
        if [ -n "${OS_ASSOC}" ] && [ -n "${RHEL_OS_ID}" ]; then
          foreman_put "operatingsystems/${RHEL_OS_ID}" "${OS_ASSOC}"
          foreman_put "operatingsystems/${CENTOS_OS_ID}" "${OS_ASSOC}"
          echo "  Associated arch=${ARCH_ID} ptable=${PTABLE_ID} with OSes"
        fi

        echo "  Creating subnets..."
        create_or_get subnets prod-us-east \
          "{\"subnet\": {\"name\": \"prod-us-east\", \"network\": \"10.10.0.0\", \"mask\": \"255.255.0.0\", \"organization_ids\": [${ACME_ORG_ID}], \"location_ids\": [${US_EAST_LOC_ID}]}}" >/dev/null
        create_or_get subnets dev-eu-central \
          "{\"subnet\": {\"name\": \"dev-eu-central\", \"network\": \"10.20.0.0\", \"mask\": \"255.255.0.0\", \"organization_ids\": [${GLOBEX_ORG_ID}], \"location_ids\": [${EU_CENTRAL_LOC_ID}]}}" >/dev/null
        echo "  Subnets created"

        echo "  Creating host groups..."
        ACME_PROD_HG_ID=$(create_or_get hostgroups acme-production \
          "{\"hostgroup\": {\"name\": \"acme-production\", \"organization_ids\": [${ACME_ORG_ID}], \"location_ids\": [${US_EAST_LOC_ID}], \"operatingsystem_id\": ${RHEL_OS_ID:-null}, \"domain_id\": ${ACME_DOMAIN_ID:-null}}}")
        create_or_get hostgroups acme-prod-web \
          "{\"hostgroup\": {\"name\": \"acme-prod-web\", \"parent_id\": ${ACME_PROD_HG_ID:-null}}}" >/dev/null
        create_or_get hostgroups acme-prod-db \
          "{\"hostgroup\": {\"name\": \"acme-prod-db\", \"parent_id\": ${ACME_PROD_HG_ID:-null}}}" >/dev/null
        create_or_get hostgroups acme-staging \
          "{\"hostgroup\": {\"name\": \"acme-staging\", \"organization_ids\": [${ACME_ORG_ID}], \"location_ids\": [${US_WEST_LOC_ID}], \"operatingsystem_id\": ${RHEL_OS_ID:-null}}}" >/dev/null
        create_or_get hostgroups globex-development \
          "{\"hostgroup\": {\"name\": \"globex-development\", \"organization_ids\": [${GLOBEX_ORG_ID}], \"location_ids\": [${EU_CENTRAL_LOC_ID}], \"operatingsystem_id\": ${CENTOS_OS_ID:-null}, \"domain_id\": ${GLOBEX_DOMAIN_ID:-null}}}" >/dev/null
        echo "  Host groups created"

        echo "  Creating users..."
        MANAGER_ROLE_ID=$(foreman_search_id roles 'name="Manager"')
        VIEWER_ROLE_ID=$(foreman_search_id roles 'name="Viewer"')

        create_or_get users alice \
          "{\"user\": {\"login\": \"alice\", \"firstname\": \"Alice\", \"lastname\": \"Johnson\", \"mail\": \"alice@acme.example.com\", \"password\": \"__DEMO_PASSWORD__\", \"auth_source_id\": 1, \"organization_ids\": [${ACME_ORG_ID}], \"location_ids\": [${US_EAST_LOC_ID}, ${US_WEST_LOC_ID}], \"default_organization_id\": ${ACME_ORG_ID:-null}, \"default_location_id\": ${US_EAST_LOC_ID:-null}, \"role_ids\": [${MANAGER_ROLE_ID}]}}" login >/dev/null
        create_or_get users bob \
          "{\"user\": {\"login\": \"bob\", \"firstname\": \"Bob\", \"lastname\": \"Smith\", \"mail\": \"bob@globex.example.com\", \"password\": \"__DEMO_PASSWORD__\", \"auth_source_id\": 1, \"organization_ids\": [${GLOBEX_ORG_ID}], \"location_ids\": [${EU_CENTRAL_LOC_ID}], \"default_organization_id\": ${GLOBEX_ORG_ID:-null}, \"default_location_id\": ${EU_CENTRAL_LOC_ID:-null}, \"role_ids\": [${VIEWER_ROLE_ID}]}}" login >/dev/null
        create_or_get users carol \
          "{\"user\": {\"login\": \"carol\", \"firstname\": \"Carol\", \"lastname\": \"Williams\", \"mail\": \"carol@example.com\", \"password\": \"__DEMO_PASSWORD__\", \"auth_source_id\": 1, \"admin\": true, \"organization_ids\": [${ACME_ORG_ID}, ${GLOBEX_ORG_ID}], \"location_ids\": [${US_EAST_LOC_ID}, ${US_WEST_LOC_ID}, ${EU_CENTRAL_LOC_ID}]}}" login >/dev/null
        echo "  Users created"

        echo "Demo configuration seeded."

        echo "  Generating registration command..."
        REG_CMD=$(curl -sf -u "${FOREMAN_AUTH}" \
          "${FOREMAN_URL}/registration_commands" \
          -X POST -H "Content-Type: application/json" \
          -d "{\"registration_command\": {\"insecure\": true, \"operatingsystem_id\": ${RHEL_OS_ID:-null}}}" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['registration_command'])")

        echo "#!/bin/bash" > /opt/foreman/registration/register.sh
        echo "${REG_CMD}" >> /opt/foreman/registration/register.sh
        sed -i "s|http://127.0.0.1:3000|http://${FOREMAN_FQDN}|g" /opt/foreman/registration/register.sh
        chmod 644 /opt/foreman/registration/register.sh
        echo "  Registration script saved to /opt/foreman/registration/register.sh"

        echo "=== Foreman Setup Complete ==="
        echo "Web UI: https://${FOREMAN_FQDN}"
        echo "Admin:  admin / __DEMO_PASSWORD__"
