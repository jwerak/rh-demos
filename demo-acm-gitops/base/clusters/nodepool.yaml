---
apiVersion: hypershift.openshift.io/v1beta1
kind: NodePool
metadata:
  name: CLUSTER_NAME-node-pool
  namespace: clusters
spec:
  clusterName: CLUSTER_NAME
  replicas: 2
  arch: amd64
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.18.43-multi
  management:
    autoRepair: true
    replace:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
  platform:
    kubevirt:
      compute:
        cores: 2
        memory: 8Gi
        qosClass: Burstable
      rootVolume:
        persistent:
          size: 32Gi
