---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"kubevirt.io/v1","kind":"VirtualMachine","name":"postgresql-vm-dev","namespace":"hybrid-app-dev"},{"apiVersion":"apps/v1","kind":"Deployment","name":"redis-dev","namespace":"hybrid-app-dev"}]'
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: POSTGRES_HOST
              value: "postgresql-vm-dev"
            - name: REDIS_HOST
              value: "redis-dev"
            - name: LOG_LEVEL
              value: "DEBUG"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
