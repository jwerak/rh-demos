---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vm-quota
  namespace: vm-dev
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 32Gi
    persistentvolumeclaims: "20"
    count/virtualmachines.kubevirt.io: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vm-quota
  namespace: vm-staging
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 32Gi
    persistentvolumeclaims: "20"
    count/virtualmachines.kubevirt.io: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vm-quota
  namespace: vm-prod
spec:
