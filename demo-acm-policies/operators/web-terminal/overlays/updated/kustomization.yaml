apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development-policies

resources:
  - ../../base

patches:
  # Use JSON 6902 patch for surgical precision - only change what's needed
  - target:
      kind: Policy
      name: web-terminal
    patch: |-
      - op: replace
        path: /spec/policy-templates/0/objectDefinition/spec/remediationAction
        value: enforce
      - op: replace
        path: /spec/policy-templates/0/objectDefinition/spec/versions
        value:
          - web-terminal.v1.11.1-0.1747215995.p
          - web-terminal.v1.11.1
          - web-terminal.v1.11.0
          - web-terminal.v1.10.1
          - web-terminal.v1.10.1-0.1740684238.p
          - web-terminal.v1.10.0-0.1720435222.p
          - web-terminal.v1.10.0-0.1732652667.p
          - web-terminal.v1.10.0-0.1731481377.p
          - web-terminal.v1.10.0-0.1727169028.p
          - web-terminal.v1.10.0
          - web-terminal.v1.10.0-0.1720402943.p
          - web-terminal.v1.9.0-0.1708477317.p
          - web-terminal.v1.9.0

# This overlay represents the upgrade state:
# - Upgrades Web Terminal from v1.9.0 to v1.10.1
# - Changes remediationAction from inform to enforce
# - Extends versions array with upgrade path
