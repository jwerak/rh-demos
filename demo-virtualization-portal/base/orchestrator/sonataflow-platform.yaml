apiVersion: sonataflow.org/v1alpha08
kind: SonataFlowPlatform
metadata:
  name: sonataflow-platform
  namespace: rhdh
spec:
  services:
    dataIndex:
      enabled: true
      persistence:
        postgresql:
          secretRef:
            name: sonataflow-db-credentials
            userKey: POSTGRES_USER
            passwordKey: POSTGRES_PASSWORD
          serviceRef:
            name: backstage-psql-rhdh
            namespace: rhdh
            port: 5432
            databaseName: backstage_plugin_orchestrator
    jobService:
      enabled: true
      persistence:
        postgresql:
          secretRef:
            name: sonataflow-db-credentials
            userKey: POSTGRES_USER
            passwordKey: POSTGRES_PASSWORD
          serviceRef:
            name: backstage-psql-rhdh
            namespace: rhdh
            port: 5432
            databaseName: backstage_plugin_orchestrator
