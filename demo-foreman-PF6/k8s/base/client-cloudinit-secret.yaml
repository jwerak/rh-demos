---
apiVersion: v1
kind: Secret
metadata:
  name: client-cloudinit
  namespace: foreman-demo
  labels:
    app: client
    app.kubernetes.io/name: client
    app.kubernetes.io/part-of: foreman-demo
    role: client
    demo: foreman-demo
type: Opaque
stringData:
  userData: |
    #cloud-config
    hostname: client
    user: cloud-user
    password: __DEMO_PASSWORD__
    chpasswd:
      expire: false
    ssh_pwauth: true

    runcmd:
      - |
        set -euo pipefail
        exec > /var/log/client-setup.log 2>&1
        echo "=== Client Setup Starting ==="

        FOREMAN_FQDN="__FOREMAN_FQDN__"
        FOREMAN_DOMAIN="__FOREMAN_DOMAIN__"

        # Derive client FQDN from VM hostname + Foreman domain
        SHORT_NAME=$(hostname -s)
        CLIENT_FQDN="${SHORT_NAME}.${FOREMAN_DOMAIN}"
        hostnamectl set-hostname "${CLIENT_FQDN}"

        # Map hostname to real eth0 IP
        VM_IP=$(ip -4 addr show eth0 | grep -oP '(?<=inet )\d+\.\d+\.\d+\.\d+')
        sed -i 's/^127\.0\.0\.1.*/127.0.0.1 localhost localhost.localdomain/' /etc/hosts
        echo "${VM_IP} ${CLIENT_FQDN} ${SHORT_NAME}" >> /etc/hosts

        # Resolve Foreman service via Kubernetes DNS
        FOREMAN_SVC_IP=$(getent hosts foreman.foreman-demo.svc.cluster.local | awk '{print $1}')
        if [ -n "${FOREMAN_SVC_IP}" ]; then
          echo "${FOREMAN_SVC_IP} ${FOREMAN_FQDN}" >> /etc/hosts
          echo "Mapped ${FOREMAN_FQDN} -> ${FOREMAN_SVC_IP} (ClusterIP)"
        else
          echo "WARNING: Could not resolve Foreman service via Kubernetes DNS"
        fi

        echo "=== Registering with Foreman ==="
        REG_URL="http://${FOREMAN_SVC_IP}:8080/register.sh"

        for i in $(seq 1 60); do
          if curl -sf "${REG_URL}" -o /tmp/register.sh 2>/dev/null; then
            echo "Got registration script, executing..."
            bash /tmp/register.sh || echo "WARNING: Registration script returned non-zero exit"
            break
          fi
          echo "Waiting for registration script... attempt ${i}/60"
          sleep 20
        done

        echo "=== Client Setup Complete ==="
        echo "Client: ${CLIENT_FQDN}"
        echo "Foreman: ${FOREMAN_FQDN}"
