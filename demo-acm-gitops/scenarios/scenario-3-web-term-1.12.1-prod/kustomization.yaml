apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/policies/web-terminal
  - ../../../base/policies/quay
  - ../../../base/policies/branding

patches:
  - target:
      kind: Policy
      name: web-terminal
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-policies
      - op: replace
        path: /spec/policy-templates/0/objectDefinition/spec/versions
        value:
          - web-terminal.v1.12.1-0.1745393748.p
          - web-terminal.v1.12.1-0.1743657317.p
          - web-terminal.v1.12.1-0.1742484227.p
          - web-terminal.v1.12.1
          - web-terminal.v1.11.1-0.1747215995.p
          - web-terminal.v1.11.1
          - web-terminal.v1.11.0
          - web-terminal.v1.10.1-0.1740684238.p
          - web-terminal.v1.10.1
          - web-terminal.v1.10.0-0.1732652667.p
          - web-terminal.v1.10.0-0.1731481377.p
          - web-terminal.v1.10.0-0.1727169028.p
          - web-terminal.v1.10.0-0.1720435222.p
          - web-terminal.v1.10.0-0.1720402943.p
          - web-terminal.v1.10.0
          - web-terminal.v1.9.0-0.1708477317.p
          - web-terminal.v1.9.0
  - target:
      kind: Policy
      name: quay-operator
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-policies
  - target:
      kind: Policy
      name: environment-branding
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-policies
      - op: replace
        path: /spec/policy-templates/0/objectDefinition/spec/object-templates/0/objectDefinition/spec/text
        value: "🔴 PRODUCTION ENVIRONMENT"
      - op: replace
        path: /spec/policy-templates/0/objectDefinition/spec/object-templates/0/objectDefinition/spec/backgroundColor
        value: "#dc291c"
  - target:
      kind: Placement
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-policies
      - op: replace
        path: /spec/clusterSets
        value:
          - prod
  - target:
      kind: PlacementBinding
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-policies
